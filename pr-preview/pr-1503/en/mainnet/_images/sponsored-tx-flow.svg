<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .actor-box { fill: #f8f9fa; stroke: #343a40; stroke-width: 1.5; rx: 6; }
      .actor-text { font-size: 14px; font-weight: 600; fill: #343a40; text-anchor: middle; }
      .lifeline { stroke: #ced4da; stroke-width: 1; stroke-dasharray: 6 4; }
      .msg-line { stroke: #0d6efd; stroke-width: 1.5; marker-end: url(#arrow-blue); }
      .msg-line-return { stroke: #198754; stroke-width: 1.5; stroke-dasharray: 6 3; marker-end: url(#arrow-green); }
      .msg-line-internal { stroke: #6f42c1; stroke-width: 1.5; marker-end: url(#arrow-purple); }
      .msg-line-chain { stroke: #dc3545; stroke-width: 1.5; marker-end: url(#arrow-red); }
      .msg-line-chain-return { stroke: #198754; stroke-width: 1.5; stroke-dasharray: 6 3; marker-end: url(#arrow-green); }
      .msg-text { font-size: 13px; fill: #212529; }
      .msg-detail { font-size: 11px; fill: #6c757d; }
      .step-badge { font-size: 11px; font-weight: 700; fill: white; text-anchor: middle; }
      .step-circle { fill: #0d6efd; }
      .note-box { fill: #e8daef; stroke: #6f42c1; stroke-width: 1; rx: 5; }
      .note-text { font-size: 11px; fill: #4a235a; }
    </style>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#0d6efd"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#198754"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6f42c1"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#dc3545"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="940" height="580" fill="white" rx="8"/>

  <!-- Actor boxes -->
  <rect x="60" y="30" width="110" height="38" class="actor-box"/>
  <text x="115" y="54" class="actor-text">User Wallet</text>

  <rect x="290" y="30" width="100" height="38" class="actor-box"/>
  <text x="340" y="54" class="actor-text">Frontend</text>

  <rect x="530" y="30" width="130" height="38" class="actor-box"/>
  <text x="595" y="54" class="actor-text">Sponsor Backend</text>

  <rect x="750" y="30" width="140" height="38" class="actor-box"/>
  <text x="820" y="54" class="actor-text">Concordium Chain</text>

  <!-- Lifelines -->
  <line x1="115" y1="68" x2="115" y2="550" class="lifeline"/>
  <line x1="340" y1="68" x2="340" y2="550" class="lifeline"/>
  <line x1="595" y1="68" x2="595" y2="550" class="lifeline"/>
  <line x1="820" y1="68" x2="820" y2="550" class="lifeline"/>

  <!-- Step 1: Connect wallet -->
  <circle cx="80" cy="110" r="10" class="step-circle"/>
  <text x="80" y="114" class="step-badge">1</text>
  <line x1="115" y1="110" x2="330" y2="110" class="msg-line"/>
  <text x="222" y="104" class="msg-text" text-anchor="middle">Connect wallet</text>

  <line x1="330" y1="140" x2="125" y2="140" class="msg-line-return"/>
  <text x="222" y="134" class="msg-text" text-anchor="middle">Account address</text>

  <!-- Step 2: Enter transfer details -->
  <circle cx="80" cy="180" r="10" class="step-circle"/>
  <text x="80" y="184" class="step-badge">2</text>
  <line x1="115" y1="180" x2="330" y2="180" class="msg-line"/>
  <text x="222" y="174" class="msg-text" text-anchor="middle">Submit transfer</text>
  <text x="222" y="192" class="msg-detail" text-anchor="middle">recipient, amount, tokenId</text>

  <!-- Step 3: Request sponsorship -->
  <circle cx="268" cy="228" r="10" class="step-circle"/>
  <text x="268" y="232" class="step-badge">3</text>
  <line x1="340" y1="228" x2="585" y2="228" class="msg-line"/>
  <text x="462" y="222" class="msg-text" text-anchor="middle">POST /sponsor</text>
  <text x="462" y="240" class="msg-detail" text-anchor="middle">{ sender, recipient, amount, tokenId, decimals }</text>

  <!-- Step 4: Backend gets nonce -->
  <circle cx="508" cy="275" r="10" class="step-circle"/>
  <text x="508" y="279" class="step-badge">4</text>
  <line x1="595" y1="275" x2="810" y2="275" class="msg-line-internal"/>
  <text x="707" y="269" class="msg-text" text-anchor="middle">getNextAccountNonce</text>

  <line x1="810" y1="305" x2="605" y2="305" class="msg-line-chain-return"/>
  <text x="707" y="299" class="msg-text" text-anchor="middle">nonce</text>

  <!-- Note: Backend builds + signs -->
  <rect x="510" y="322" width="170" height="46" class="note-box"/>
  <text x="595" y="340" class="note-text" text-anchor="middle">Build transaction, add</text>
  <text x="595" y="356" class="note-text" text-anchor="middle">sponsor, sign with key</text>

  <!-- Step 5: Return sponsored tx -->
  <circle cx="268" cy="400" r="10" class="step-circle"/>
  <text x="268" y="404" class="step-badge">5</text>
  <line x1="585" y1="400" x2="350" y2="400" class="msg-line-return"/>
  <text x="462" y="394" class="msg-text" text-anchor="middle">{ sponsoredTransaction }</text>

  <!-- Step 6: Send to wallet for user signature -->
  <text x="232" y="440" class="msg-text" text-anchor="middle">Sign transaction</text>
  <line x1="340" y1="452" x2="125" y2="452" class="msg-line"/>
  <circle cx="80" cy="452" r="10" class="step-circle"/>
  <text x="80" y="456" class="step-badge">6</text>
  <text x="232" y="466" class="msg-detail" text-anchor="middle">wallet popup for review</text>

  <!-- Step 7: Submit to chain -->
  <circle cx="80" cy="502" r="10" class="step-circle"/>
  <text x="80" y="506" class="step-badge">7</text>
  <line x1="115" y1="502" x2="810" y2="502" class="msg-line-chain"/>
  <text x="462" y="496" class="msg-text" text-anchor="middle">Submit signed transaction</text>
  <text x="462" y="514" class="msg-detail" text-anchor="middle">fee deducted from sponsor account</text>

  <!-- Return tx hash -->
  <line x1="810" y1="540" x2="350" y2="540" class="msg-line-chain-return"/>
  <text x="580" y="534" class="msg-text" text-anchor="middle">Transaction hash</text>
</svg>
